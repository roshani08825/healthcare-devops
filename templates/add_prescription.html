<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Prescription - Healthcare Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="dashboard-header">
        <h1>➕ Add New Prescription</h1>
        <a href="{{ url_for('view_prescriptions') }}" class="logout-btn">Back to Prescriptions</a>
    </header>

    <div class="container">
        <form method="POST" class="prescription-form">
            <div class="form-group">
                <label for="patient_name">Patient Name:</label>
                <input type="text" id="patient_name" name="patient_name" value="{{ session['username'] }}" required>
            </div>

            <div class="form-group">
                <label for="doctor_name">Doctor's Name:</label>
                <input type="text" id="doctor_name" name="doctor_name" required>
            </div>

            <div class="form-group">
                <label for="medication_name">Medication Name:</label>
                <input type="text" id="medication_name" name="medication_name" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="dosage">Dosage:</label>
                    <input type="text" id="dosage" name="dosage" placeholder="e.g., 500mg" required>
                </div>

                <div class="form-group">
                    <label for="frequency">Frequency:</label>
                    <input type="text" id="frequency" name="frequency" placeholder="e.g., Twice daily" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="duration">Duration:</label>
                    <input type="text" id="duration" name="duration" placeholder="e.g., 7 days" required>
                </div>

                <div class="form-group">
                    <label for="date_prescribed">Date Prescribed:</label>
                    <input type="date" id="date_prescribed" name="date_prescribed" required>
                </div>
            </div>

            <div class="form-group">
                <label for="instructions">Special Instructions:</label>
                <textarea id="instructions" name="instructions" rows="4" placeholder="Any special instructions..."></textarea>
            </div>

            <button type="submit" class="btn">Save Prescription</button>
        </form>
    </div>
</body>
</html>
